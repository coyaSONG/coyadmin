version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 2
    ignore:
      # typescript-eslint 8.64 supports TypeScript versions below 6.1.
      - dependency-name: typescript
        versions: [">=6.1.0"]
    commit-message:
      prefix: chore
      include: scope
